name: build-and-upload

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Erlang and Gleam
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "latest"

      # Download dependencies
      - run: gleam deps download

      # Build the project specifically for production JavaScript
      - run: gleam build --target=javascript

      # Upload the compiled JS build folder as an artifact zip
      - name: Upload JavaScript Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lustre-javascript-build
          path: build/dev/javascript/     # This paths directly to your compiled JS files
