name: build-for-infinityfree

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Erlang and Gleam
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "latest"

      # 2. Download dependencies
      - run: gleam deps download

      # 3. Compile the Lustre frontend to production JavaScript
      - run: gleam build --target=javascript

      # 4. Create a deployment staging directory
      - name: Prepare Staging Folder
        run: |
          mkdir -p deploy_dist
          
          # Copy your compiled JavaScript files into the deploy folder
          # Note: Adjust the 'my_if_game' folder name if your project has a different name in gleam.toml
          cp -r build/dev/javascript/* deploy_dist/

      # 5. Create the index.html dynamically inside the deploy folder
      - name: Create index.html
        run: |
          cat << 'EOF' > deploy_dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>My If Game</title>
          </head>
          <body>
              <div id="app"></div>
              
              <script type="module" src="./my_if_game/main.mjs"></script>
          </body>
          </html>
          EOF

      # 6. Upload the folder containing both index.html and your JS modules as a single ZIP
      - name: Upload InfinityFree Ready ZIP
        uses: actions/upload-artifact@v4
        with:
          name: infinityfree-htdocs-upload
          path: deploy_dist/
