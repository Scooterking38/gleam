name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The modern, all-in-one replacement action:
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"       # Installs Erlang
          gleam-version: "latest"   # Installs the newest version of Gleam automatically

      - run: gleam deps download
      - run: gleam test
